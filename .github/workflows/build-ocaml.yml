---
name: Build / OCaml

on:
  pull_request:
    paths:
    - dune-project
    - opamui.opam
    - bin/**/*.ml
    - lib/**/*.ml
    - test/**/*.ml
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
        - ubuntu-latest
        - macos-latest
        # - windows-latest

    runs-on: ${{ matrix.os }}

    name: Build on ${{ matrix.os }}

    steps:
    - name: 🚚 Checkout
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      with:
        fetch-depth: 0

    - name: 🎉 Set-up OCaml
      uses: ocaml/setup-ocaml@e32b06a3e831ff2fbc6f08cf35be2085e3918014 # v3.6.1
      with:
        ocaml-compiler: 5.2.x

    - name: 🎉 Install dependencies
      run: opam install . --deps-only --with-test

    - name: ✅ Build application
      run: opam exec -- dune build

    - name: ✅ Execute tests
      run: opam exec -- dune runtest

    - name: Attest build provenance
      uses: actions/attest-build-provenance@00014ed6ed5efc5b1ab7f7f34a39eb55d41aa4f8 # v3.1.0
      with:
        subject-path: _build/default/world.exe

    - name: Upload the build artifact
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
      with:
        name: ${{ matrix.os }}-${{ matrix.ocaml-compiler }}-opamui
        path: _build/default/opamui.exe

  lint-doc:
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Checkout
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      with:
        fetch-depth: 0

    - name: 🎉 Set-up OCaml
      uses: ocaml/setup-ocaml@e32b06a3e831ff2fbc6f08cf35be2085e3918014 # v3.6.1
      with:
        ocaml-compiler: 5.2.x

    - name: ✅ Lint documentation
      uses: ocaml/setup-ocaml/lint-doc@dec6499fef64fc5d7ed43d43a87251b7b1c306f5 # v3.4.8

  lint-fmt:
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Checkout
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      with:
        fetch-depth: 0

    - name: 🎉 Set-up OCaml
      uses: ocaml/setup-ocaml@e32b06a3e831ff2fbc6f08cf35be2085e3918014 # v3.6.1
      with:
        ocaml-compiler: 5.2.x

    - name: ✅ OCaml formatting
      uses: ocaml/setup-ocaml/lint-fmt@dec6499fef64fc5d7ed43d43a87251b7b1c306f5 # v3.4.8

  lint-opam:
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Checkout
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      with:
        fetch-depth: 0

    - name: 🎉 Set-up OCaml
      uses: ocaml/setup-ocaml@e32b06a3e831ff2fbc6f08cf35be2085e3918014 # v3.6.1
      with:
        ocaml-compiler: 5.2.x

    - name: ✅ Lint OPam configuration
      uses: ocaml/setup-ocaml/lint-opam@dec6499fef64fc5d7ed43d43a87251b7b1c306f5 # v3.4.8
